<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo — Locadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">
</head>
<body>

<div class="container mt-4 pb-4">

    <!-- Cabeçalho do painel -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            <i class="fas fa-tachometer-alt me-2 text-primary"></i> Painel de Controle
        </h2>
        <div>
            <span class="badge bg-dark fs-6 p-2 shadow-sm">
                <i class="fas fa-user-circle me-1"></i>
                <span id="userNameDisplay">Admin Estático</span>
            </span>
            <button class="btn btn-outline-danger btn-sm ms-2">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
            <a href="index.html" class="btn btn-outline-secondary btn-sm ms-1">
                <i class="fas fa-external-link-alt"></i> Ver Site
            </a>
        </div>
    </div>

    <!-- Linha com dois painéis -->
    <div class="row g-4 mb-4">

        <!-- Painel de adicionar veículo -->
        <div class="col-md-6" id="painelAdmin">
            <div class="card shadow-sm h-100 border-0 border-top border-primary border-3">

                <!-- Cabeçalho do card -->
                <div class="card-header bg-white fw-bold py-3">
                    <i class="fas fa-plus-circle text-primary me-1"></i> Adicionar novo Veículo
                </div>

                <!-- Corpo com formulário -->
                <div class="card-body">
                    <form id="formAddVeiculo">

                        <!-- Linha: modelo + placa -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-semibold text-muted">Modelo</label>
                                <input type="text" class="form-control" id="modelo" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-semibold text-muted">Placa</label>
                                <input type="text" class="form-control" id="placa" required>
                            </div>
                        </div>

                        <!-- Linha: tipo + imagem -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-semibold text-muted">Tipo</label>
                                <select class="form-select" id="tipo" required>
                                    <option value="Carro">Carro</option>
                                    <option value="Moto">Moto</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label small fw-semibold text-muted">Foto</label>
                                <input type="file" class="form-control" id="imagem">
                            </div>
                        </div>

                        <!-- Botão de envio -->
                        <button type="submit" class="btn btn-primary w-100 fw-bold">
                            <i class="fas fa-save me-1"></i> Cadastrar Veículo (Estático)
                        </button>

                    </form>
                </div>
            </div>
        </div>

        <!-- Painel de previsão de aluguel -->
        <div id="painelPrevisao" class="col-md-6">
            <div class="card shadow-sm h-100 border-0 border-top border-info border-3">

                <!-- Cabeçalho -->
                <div class="card-header bg-white fw-bold py-3">
                    <i class="fas fa-calculator text-info me-1"></i> Calcular Previsão
                </div>

                <!-- Corpo -->
                <div class="card-body">

                    <!-- Seleção de tipo -->
                    <div class="mb-3">
                        <label class="form-label small text-muted">Tipo</label>
                        <select class="form-select" id="simTipo">
                            <option value="Carro">Carro</option>
                            <option value="Moto">Moto</option>
                        </select>
                    </div>

                    <!-- Quantidade de dias -->
                    <div class="mb-4">
                        <label class="form-label small text-muted">Dias</label>
                        <input type="number" class="form-control" id="simDias" value="1" min="1">
                    </div>

                    <!-- Botão de cálculo -->
                    <button class="btn btn-info text-white w-100 fw-bold">
                        Gerar Orçamento (Estático)
                    </button>

                </div>
            </div>
        </div>

    </div><!-- fim .row -->

    <!-- Tabela de veículos -->
    <div class="card shadow-sm border-0">

        <!-- Cabeçalho -->
        <div class="card-header bg-dark text-white fw-semibold py-3">
            <i class="fas fa-list me-1"></i> Frota
        </div>

        <!-- Corpo -->
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0 align-middle">

                    <!-- Cabeçalho da tabela -->
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">Foto</th>
                            <th>Tipo</th>
                            <th>Modelo</th>
                            <th>Placa</th>
                            <th>Status</th>
                            <th id="thAcoes" class="text-end pe-4">Ações</th>
                        </tr>
                    </thead>

                    <!-- Corpo da tabela -->
                    <tbody id="tabelaVeiculos">

                        <!-- Veículo disponível -->
                        <tr>
                            <td class="ps-3">
                                <img src="../../imagens/Sandero.png" class="admin-mini-img" alt="Sandero">
                            </td>
                            <td>Carro</td>
                            <td>Sandero</td>
                            <td>FMA-6680</td>
                            <td><span class="badge bg-success">Disponível</span></td>
                            <td class="text-end pe-3 table-actions">
                                <!-- Editar -->
                                <button class="btn btn-outline-primary btn-sm ms-1"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalEditarVeiculo">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <!-- Alugar -->
                                <button class="btn btn-warning btn-sm ms-1">
                                    <i class="fas fa-lock"></i> Alugar
                                </button>
                                <!-- Excluir -->
                                <button class="btn btn-outline-danger btn-sm ms-1">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>

                        <!-- Veículo alugado -->
                        <tr>
                            <td class="ps-3">
                                <img src="../../imagens/Ninja.png" class="admin-mini-img" alt="Ninja">
                            </td>
                            <td>Moto</td>
                            <td>Ninja</td>
                            <td>FMA-6600</td>
                            <td><span class="badge bg-danger">Alugado</span></td>
                            <td class="text-end pe-3 table-actions">
                                <!-- Editar -->
                                <button class="btn btn-outline-primary btn-sm ms-1"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalEditarVeiculo">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <!-- Devolver -->
                                <button class="btn btn-success btn-sm ms-1">
                                    <i class="fas fa-check-circle"></i> Devolver
                                </button>
                                <!-- Excluir -->
                                <button class="btn btn-outline-danger btn-sm ms-1">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </div><!-- fim tabela de veículos -->

</div><!-- fim .container -->

<!-- Modal de edição -->
<div class="modal fade" id="modalEditarVeiculo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <!-- Cabeçalho -->
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title fw-bold">
                    <i class="fas fa-edit"></i> Editar Veículo
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <!-- Corpo -->
            <div class="modal-body">
                <p>Nesta fase 1 o formulário é apenas visual.</p>
                <input type="text" class="form-control mb-3" placeholder="Modelo">
                <input type="text" class="form-control" placeholder="Placa">
            </div>
        </div>
    </div>
</div>

<!-- Script do Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
